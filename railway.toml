[build]
builder = "nixpacks"
buildCommand = "NODE_ENV=production corepack enable && corepack prepare pnpm@9.15.0 --activate && pnpm install && pnpm build"

[deploy]
startCommand = "pnpm --filter @konkatsu/web start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
